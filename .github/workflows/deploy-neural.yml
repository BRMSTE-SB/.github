name: Deploy BRMSTE Neural Edge

# Publishes site/neural to brmste.com/neural* via Cloudflare Workers static assets.
# Gated: it no-ops cleanly until CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID exist.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site/neural/**"
      - ".github/workflows/deploy-neural.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify DSP core
        working-directory: site/neural
        run: node dsp.test.mjs

      - name: Gate on Cloudflare secrets
        id: gate
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets absent — deploy skipped (page validated only)."
          fi

      - name: Deploy to Cloudflare
        if: steps.gate.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site/neural
          command: deploy
