name: BRMSTE Edge — CI (npm · Cloudflare Workers)

# BRMSTE LTD · Companies House 15310393 · GB2607860 · PCT/GB2026/050406
#
# npm-managed Cloudflare Workers pipeline for edge/:
#   1. Brand + patent gate (clean checkout, no node_modules)
#   2. npm ci → typecheck → test (workerd) → wrangler dry-run build
#   3. Deploy with `npm run deploy` on push to main, only when CF creds exist
#
# Required GitHub Actions secrets for the deploy job (org or repo level):
#   CF_API_TOKEN   — Cloudflare API token (Workers:Edit + Zone:Edit/Read)
#   CF_ACCOUNT_ID  — Cloudflare account ID
#
# CURSOR NEVER SIGNS · OPERATOR NEVER SIGNS · EDGE SIGNS · JUDGMENT SIGNS

on:
  push:
    branches: [main]
    paths:
      - "edge/**"
      - ".github/workflows/edge-ci.yml"
      - "scripts/git-worker-brand-patent-gate.sh"
  pull_request:
    branches: [main]
    paths:
      - "edge/**"
      - ".github/workflows/edge-ci.yml"
      - "scripts/git-worker-brand-patent-gate.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: edge-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: brand + patent gate (runs on a clean checkout, before any install) ─
  gate:
    name: Brand & Patent Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run BRMSTE brand + patent gate
        run: bash scripts/git-worker-brand-patent-gate.sh fort_knox_private

  # ── Job 2: npm install + typecheck + test (workerd) + dry-run build ──────────
  build-test:
    name: npm ci · typecheck · test · dry-run build
    needs: gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: edge/package-lock.json

      - name: Install dependencies (reproducible)
        run: npm ci

      - name: Type-check (tsc --noEmit, @cloudflare/workers-types)
        run: npm run typecheck

      - name: Test inside the Workers runtime (workerd)
        run: npm test

      - name: Build the Worker bundle (wrangler deploy --dry-run)
        run: npm run deploy:dry

  # ── Job 3: deploy to Cloudflare Workers (push to main, creds permitting) ─────
  deploy:
    name: Deploy to Cloudflare Workers
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: edge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight — require Cloudflare credentials
        id: creds
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CF_API_TOKEN / CF_ACCOUNT_ID not set — skipping deploy."
          fi

      - name: Setup Node.js
        if: steps.creds.outputs.have_creds == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: edge/package-lock.json

      - name: Install dependencies (reproducible)
        if: steps.creds.outputs.have_creds == 'true'
        run: npm ci

      - name: Deploy Worker (npm run deploy)
        if: steps.creds.outputs.have_creds == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run deploy
