name: Verify Domain Registry

on:
  push:
    branches: [main]
    paths:
      - "domains/registry.json"
      - "domains/registry.schema.json"
      - "scripts/verify-domains-registry.sh"
      - "coming-soon/wrangler.toml"
      - "data/hetzner/servers.json"
  pull_request:
    branches: [main]
    paths:
      - "domains/registry.json"
      - "domains/registry.schema.json"
      - "scripts/verify-domains-registry.sh"
      - "coming-soon/wrangler.toml"
      - "data/hetzner/servers.json"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Structural gate (credential-free)
        run: bash scripts/verify-domains-registry.sh
