name: Deploy All 200 — Coming Soon + Quantum GI

# Deploy brmste-com-coming-soon + brmste-quantum-gi and bind path-specific routes
# so /health, /brand, /starmind, /substrate/*, /quantum/* return 200.
#
# Secrets (operator-managed in GitHub — never in chat):
#   CF_API_TOKEN, CF_ACCOUNT_ID
# Optional: ETORO_API_KEY, ETORO_USER_KEY, IBM_QUANTUM_API_KEY (for banking + quantum secrets)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run route attachment only"
        type: boolean
        default: false
      skip_etoro:
        description: "Skip eToro banking secret wiring"
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - "coming-soon/**"
      - "workers/**"
      - "scripts/deploy-200-routes.sh"
      - "scripts/deploy-quantum-gi-worker.sh"
      - ".github/workflows/deploy-all-200.yml"

permissions:
  contents: read

concurrency:
  group: deploy-all-200
  cancel-in-progress: false

jobs:
  gate:
    name: Brand & Patent Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/git-worker-brand-patent-gate.sh human_open

  deploy:
    name: Deploy Workers + 200 Routes
    needs: gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — Cloudflare secrets
        run: |
          if [[ -z "${{ secrets.CF_API_TOKEN }}" ]]; then
            echo "::error::CF_API_TOKEN secret is not set."
            exit 1
          fi
          if [[ -z "${{ secrets.CF_ACCOUNT_ID }}" ]]; then
            echo "::error::CF_ACCOUNT_ID secret is not set."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install coming-soon dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        working-directory: coming-soon
        run: npm ci

      - name: Install workers dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        working-directory: workers
        run: npm ci

      - name: Deploy coming-soon Worker
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        working-directory: coming-soon
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run deploy

      - name: Deploy quantum-gi Worker
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: bash scripts/deploy-quantum-gi-worker.sh

      - name: Wire IBM quantum secret (optional)
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry_run != true) && secrets.IBM_QUANTUM_API_KEY != '' }}
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          IBM_QUANTUM_API_KEY: ${{ secrets.IBM_QUANTUM_API_KEY }}
        run: |
          printf '%s' "$IBM_QUANTUM_API_KEY" | npx wrangler secret put IBM_QUANTUM_API_KEY --name brmste-quantum-gi

      - name: Wire eToro banking secrets (optional)
        if: >-
          ${{
            (github.event_name != 'workflow_dispatch' || inputs.dry_run != true) &&
            (github.event_name != 'workflow_dispatch' || inputs.skip_etoro != true) &&
            secrets.ETORO_API_KEY != '' &&
            secrets.ETORO_USER_KEY != ''
          }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ETORO_API_KEY: ${{ secrets.ETORO_API_KEY }}
          ETORO_USER_KEY: ${{ secrets.ETORO_USER_KEY }}
          ETORO_ENV: real
        run: bash scripts/set-banking-worker-secrets.sh

      - name: Bind path-specific 200 routes
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          bash scripts/deploy-200-routes.sh "${ARGS[@]}"

      - name: Verify all 200 endpoints
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        run: bash scripts/verify-200-endpoints.sh
