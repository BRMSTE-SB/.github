name: BRMSTE Coming Soon — Deploy to All CF Zones

# Deploy brmste-com-coming-soon Worker and route it to every zone in the
# BRMSTE Cloudflare account (38 zones).
#
# Required secrets (operator-managed in GitHub Settings — agents never request these in chat):
# CF_API_TOKEN, CF_ACCOUNT_ID
# Agents: use Cloudflare MCP (Cloudflare-bindings / Cloudflare-builds) — see docs/MCP-AGENT-POLICY.md

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run route attachment only (skip worker deploy)"
        type: boolean
        default: false
      routes_only:
        description: "Attach routes only (skip worker deploy)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "coming-soon/**"
      - "scripts/deploy-coming-soon-all-zones.sh"
      - "scripts/sync-cf-zones-to-manifest.sh"
      - ".github/workflows/deploy-coming-soon.yml"

permissions:
  contents: read

concurrency:
  group: deploy-coming-soon
  cancel-in-progress: false

jobs:
  gate:
    name: Brand & Patent Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/git-worker-brand-patent-gate.sh human_open

  deploy:
    name: Deploy Coming Soon Worker + Routes
    needs: gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — Cloudflare secrets
        run: |
          if [[ -z "${{ secrets.CF_API_TOKEN }}" ]]; then
            echo "::error::CF_API_TOKEN secret is not set. Add it in GitHub → Settings → Secrets → Actions."
            echo "Create token at https://dash.cloudflare.com/profile/api-tokens with Workers:Edit + Zone:Worker Routes:Edit on all zones."
            exit 1
          fi
          if [[ -z "${{ secrets.CF_ACCOUNT_ID }}" ]]; then
            echo "::error::CF_ACCOUNT_ID secret is not set. Use: 7ea6547b1d6eb1cbd6d0ac5cf960ce2a"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install coming-soon dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.routes_only != true }}
        working-directory: coming-soon
        run: npm ci

      - name: Deploy Worker (brmste-com-coming-soon)
        if: ${{ (github.event_name != 'workflow_dispatch' || (inputs.routes_only != true && inputs.dry_run != true)) }}
        working-directory: coming-soon
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run deploy

      - name: Sync zone manifest from Cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: bash scripts/sync-cf-zones-to-manifest.sh

      - name: Route all zones to coming-soon Worker
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          bash scripts/deploy-coming-soon-all-zones.sh "${ARGS[@]}"

      - name: Verify /health and /brand on primary domains
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        run: |
          for host in brmste.com brmste.ai businessscience.ai re-tyre.com; do
            echo "Checking https://${host}/health"
            body=$(curl -fsS --max-time 20 "https://${host}/health" || echo '{}')
            echo "$body" | jq -e '.page == "brmste-coming-soon-v6-re-tyre-cinematic"' >/dev/null \
              && echo "✓ ${host} health (v6 cinematic)" \
              || echo "⚠ ${host} health — not yet serving coming-soon v6 cinematic (may need propagation)"
            go_live_status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "https://${host}/go-live" || echo "000")
            if [[ "$go_live_status" == "200" ]]; then
              echo "✓ ${host}/go-live"
            else
              echo "⚠ ${host}/go-live — HTTP ${go_live_status}"
            fi
            if [[ "$host" == "re-tyre.com" ]]; then
              api_body=$(curl -fsS --max-time 20 "https://${host}/api/retyre/status" || echo '{}')
              echo "$api_body" | jq -e '.entity.companiesHouse == "15310148"' >/dev/null \
                && echo "✓ re-tyre.com API · CH 15310148" \
                || echo "⚠ re-tyre.com API — entity mismatch"
            fi
            if [[ "$host" == "brmste.com" ]]; then
              onchain_status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "https://${host}/on-chain" || echo "000")
              if [[ "$onchain_status" == "200" ]]; then
                echo "✓ brmste.com/on-chain"
              else
                echo "⚠ brmste.com/on-chain — HTTP ${onchain_status}"
              fi
              ip_body=$(curl -fsS --max-time 20 "https://${host}/api/ip-valuation/status" || echo '{}')
              echo "$ip_body" | jq -e '.anchor.address == "32i1m6gNcSHwiPX9nfTNXVjme9j5DU8y5g"' >/dev/null \
                && echo "✓ IP valuation API · mempool anchor" \
                || echo "⚠ IP valuation API — anchor mismatch"
            fi
          done
