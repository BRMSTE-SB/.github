name: BRMSTE Coming Soon — Deploy to All CF Zones

# Deploy brmste-com-coming-soon Worker and route it to every zone in the
# BRMSTE Cloudflare account (38 zones).
#
# Required secrets (operator-managed in GitHub Settings — agents never request these in chat):
# CF_API_TOKEN, CF_ACCOUNT_ID
# Agents: use Cloudflare MCP (Cloudflare-bindings / Cloudflare-builds) — see docs/MCP-AGENT-POLICY.md

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run route attachment only (skip worker deploy)"
        type: boolean
        default: false
      routes_only:
        description: "Attach routes only (skip worker deploy)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "coming-soon/**"
      - "scripts/deploy-coming-soon-all-zones.sh"
      - "scripts/verify-wrangler-workers.sh"
      - "scripts/sync-cf-zones-to-manifest.sh"
      - ".github/workflows/deploy-coming-soon.yml"

permissions:
  contents: read

concurrency:
  group: deploy-coming-soon
  cancel-in-progress: false

jobs:
  gate:
    name: Brand & Patent Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/git-worker-brand-patent-gate.sh human_open

  verify-wrangler:
    name: Verify Wrangler Worker (no credentials)
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify wrangler build + local routes
        run: bash scripts/verify-wrangler-workers.sh

  deploy:
    name: Deploy Coming Soon Worker + Routes
    needs: verify-wrangler
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — Cloudflare secrets
        id: cf
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [[ -z "${CF_API_TOKEN}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CF_API_TOKEN secret is not set — skipping Cloudflare deploy."
            echo "Add it in GitHub → Settings → Secrets → Actions (Workers:Edit + Zone:Worker Routes:Edit)."
            exit 0
          fi
          if [[ -z "${CF_ACCOUNT_ID}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CF_ACCOUNT_ID secret is not set — skipping Cloudflare deploy."
            echo "Use account id: 7ea6547b1d6eb1cbd6d0ac5cf960ce2a"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.configured == 'true'
        with:
          node-version: "22"

      - name: Install coming-soon dependencies
        if: steps.cf.outputs.configured == 'true' && (github.event_name != 'workflow_dispatch' || inputs.routes_only != true)
        working-directory: coming-soon
        run: npm ci

      - name: Deploy Worker (brmste-com-coming-soon)
        if: steps.cf.outputs.configured == 'true' && (github.event_name != 'workflow_dispatch' || (inputs.routes_only != true && inputs.dry_run != true))
        working-directory: coming-soon
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run deploy

      - name: Sync zone manifest from Cloudflare
        if: steps.cf.outputs.configured == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: bash scripts/sync-cf-zones-to-manifest.sh

      - name: Route all zones to coming-soon Worker
        if: steps.cf.outputs.configured == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          bash scripts/deploy-coming-soon-all-zones.sh "${ARGS[@]}"

      - name: Verify /health and /brand on primary domains
        if: steps.cf.outputs.configured == 'true' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        run: |
          for host in brmste.com brmste.ai businessscience.ai re-tyre.com; do
            echo "Checking https://${host}/health"
            body=$(curl -fsS --max-time 20 "https://${host}/health" || echo '{}')
            echo "$body" | jq -e '.page == "brmste-coming-soon-v5"' >/dev/null \
              && echo "✓ ${host} health" \
              || echo "⚠ ${host} health — not yet serving coming-soon v5 (may need propagation)"
            brand_status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "https://${host}/brand" || echo "000")
            if [[ "$brand_status" == "200" ]]; then
              echo "✓ ${host}/brand"
            else
              echo "⚠ ${host}/brand — HTTP ${brand_status}"
            fi
          done
