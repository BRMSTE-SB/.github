name: BRMSTE Brand Patent Gate

on:
  workflow_call:
    inputs:
      lane:
        required: true
        type: string
        description: fort_knox_private or human_open

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout BRMSTE governance
        uses: actions/checkout@v4
        with:
          repository: BRMSTE-SB/.github
          path: _brmste-governance

      - name: Run strict brand and patent gate
        id: gate
        run: bash _brmste-governance/scripts/git-worker-brand-patent-gate.sh "${{ inputs.lane }}"

      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ steps.gate.outcome }}"
          ICON="✅"
          [[ "$STATUS" != "success" ]] && ICON="❌"
          {
            echo "## ${ICON} BRMSTE Brand + Patent Gate"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Lane  | \`${{ inputs.lane }}\` |"
            echo "| Repo  | \`${{ github.repository }}\` |"
            echo "| Ref   | \`${{ github.ref }}\` |"
            echo "| Result | **${STATUS}** |"
            echo ""
            echo "Patent: GB2607860 · PCT/GB2026/050406 — BRMSTE LTD"
          } >> "$GITHUB_STEP_SUMMARY"
