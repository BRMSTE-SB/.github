name: BRMSTE Email Inbox — Test & Deploy

# Cloudflare Email Worker that captures mail to sb@brmste.ai into D1
# (brmste-email-inbox) and serves a token-protected /inbox reader.
#
# Required secrets (operator-managed in GitHub Settings — agents never request
# these in chat): CF_API_TOKEN, CF_ACCOUNT_ID
# Optional secret: INBOX_TOKEN (Bearer token for GET /inbox). Until it is set,
# /inbox safely returns 503 (locked).
# Agents: use Cloudflare MCP (Cloudflare-bindings / Cloudflare-builds).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "email-inbox/**"
      - ".github/workflows/deploy-email-inbox.yml"
  push:
    branches: [main]
    paths:
      - "email-inbox/**"
      - ".github/workflows/deploy-email-inbox.yml"

permissions:
  contents: read

concurrency:
  group: deploy-email-inbox
  cancel-in-progress: false

jobs:
  test:
    name: Brand Gate & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/git-worker-brand-patent-gate.sh human_open
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: email-inbox
        run: npm ci || npm install
      - name: Run tests
        working-directory: email-inbox
        run: npm test

  deploy:
    name: Deploy Email Worker
    needs: test
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — Cloudflare secrets
        run: |
          if [[ -z "${{ secrets.CF_API_TOKEN }}" ]]; then
            echo "::error::CF_API_TOKEN secret is not set. Add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: email-inbox
        run: npm ci || npm install

      - name: Apply D1 schema (idempotent)
        working-directory: email-inbox
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler d1 execute brmste-email-inbox --remote --file=./schema.sql

      - name: Deploy Worker (brmste-email-inbox)
        working-directory: email-inbox
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run deploy

      - name: Set INBOX_TOKEN secret (if provided)
        if: ${{ secrets.INBOX_TOKEN != '' }}
        working-directory: email-inbox
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          INBOX_TOKEN: ${{ secrets.INBOX_TOKEN }}
        run: printf '%s' "$INBOX_TOKEN" | npx wrangler secret put INBOX_TOKEN
