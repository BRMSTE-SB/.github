name: BRMSTE Auth Setup (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: >
          GitHub Environment name.
          Allowed: fort-knox-prod | fort-knox-staging | human-open
      lane:
        required: false
        type: string
        default: fort_knox_private
        description: Brand+patent gate lane (fort_knox_private | human_open)
      cloudflare_account_id:
        required: false
        type: string
        default: ''
        description: >
          Cloudflare account ID. When set the workflow verifies that the
          token can reach the Workers Scripts API for this account.
      verify_cloudflare:
        required: false
        type: boolean
        default: false
        description: >
          Verify CLOUDFLARE_API_TOKEN / CF_API_TOKEN liveness and, when
          cloudflare_account_id is also provided, the Workers Scripts scope.
      verify_r2:
        required: false
        type: boolean
        default: false
        description: >
          Verify R2_ACCESS_KEY_ID + R2_SECRET_ACCESS_KEY are present in the
          environment and probe the R2 S3 endpoint for liveness.
    secrets:
      # Wrangler canonical name â€” preferred.
      CLOUDFLARE_API_TOKEN:
        required: false
      # Legacy alias â€” checked as fallback when CLOUDFLARE_API_TOKEN is absent.
      CF_API_TOKEN:
        required: false
      # R2 S3-compatible credentials (Access Key ID is not secret but kept
      # here so it flows through the same environment-scoped path as the secret).
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false

permissions:
  id-token: write   # Required to mint GitHub OIDC tokens.
  contents: read

jobs:
  auth-setup:
    name: Auth setup Â· ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 10

    concurrency:
      group: brmste-auth-setup-${{ inputs.environment }}-${{ github.ref }}
      cancel-in-progress: false   # Never cancel auth checks mid-run.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout BRMSTE governance
        uses: actions/checkout@v4
        with:
          repository: BRMSTE-SB/.github
          path: _brmste-governance

      # â”€â”€ 1. Brand + patent gate â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Brand + patent gate
        run: bash _brmste-governance/scripts/git-worker-brand-patent-gate.sh "${{ inputs.lane }}"

      # â”€â”€ 2. Environment allowlist + OIDC audience derivation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Validate BRMSTE environment
        id: env-check
        run: |
          ENV="${{ inputs.environment }}"
          case "$ENV" in
            fort-knox-prod|fort-knox-staging)
              OIDC_AUDIENCE="brmste-fort-knox"
              ;;
            human-open)
              OIDC_AUDIENCE="brmste-human-open"
              ;;
            *)
              echo "::error::Unknown BRMSTE environment: '$ENV'" \
                "â€” allowed: fort-knox-prod | fort-knox-staging | human-open"
              exit 1
              ;;
          esac
          echo "oidc_audience=$OIDC_AUDIENCE" >> "$GITHUB_OUTPUT"
          echo "BRMSTE-AUTH OK: environment=$ENV â†’ audience=$OIDC_AUDIENCE"

      # â”€â”€ 3. GitHub OIDC token â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Mint GitHub OIDC token
        id: oidc
        run: |
          AUDIENCE="${{ steps.env-check.outputs.oidc_audience }}"
          TOKEN=$(curl --fail --silent \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" \
            | jq -r '.value // empty')
          if [[ -z "$TOKEN" ]]; then
            echo "::error::OIDC token request failed." \
              "Confirm 'id-token: write' is set in the calling workflow's permissions."
            exit 1
          fi
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | base64 --decode 2>/dev/null || true)
          SUB=$(echo "$PAYLOAD"   | jq -r '.sub      // "unknown"')
          REF=$(echo "$PAYLOAD"   | jq -r '.ref      // "unknown"')
          REPO=$(echo "$PAYLOAD"  | jq -r '.repository // "unknown"')
          echo "oidc_sub=$SUB"   >> "$GITHUB_OUTPUT"
          echo "oidc_ref=$REF"   >> "$GITHUB_OUTPUT"
          echo "oidc_repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "BRMSTE-AUTH OK: OIDC token minted â€” sub=$SUB ref=$REF"

      # â”€â”€ 4. Cloudflare token verification â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Resolve Cloudflare API token
        id: cf-token
        if: inputs.verify_cloudflare == true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN:         ${{ secrets.CF_API_TOKEN }}
        run: |
          # Prefer the wrangler-canonical name; fall back to legacy alias.
          TOKEN="${CLOUDFLARE_API_TOKEN:-${CF_API_TOKEN:-}}"
          if [[ -z "$TOKEN" ]]; then
            echo "::error::No Cloudflare API token found." \
              "Add CLOUDFLARE_API_TOKEN to GitHub Environment '${{ inputs.environment }}'." \
              "Dashboard: https://dash.cloudflare.com/profile/api-tokens"
            exit 1
          fi
          # Mask the token so it never appears in logs.
          echo "::add-mask::$TOKEN"
          echo "cf_token_resolved=true" >> "$GITHUB_OUTPUT"
          # Pass the resolved token as a masked output for subsequent steps.
          echo "resolved_token=$TOKEN" >> "$GITHUB_OUTPUT"

      # R2-scoped tokens (cfat_ prefix) return error 1000 from /user/tokens/verify
      # but are fully valid for Workers API calls. We try the standard verify
      # endpoint first; on error 1000 we mark the token as R2-type and continue.
      # The Workers scope probe below confirms actual API access regardless of type.
      - name: Verify Cloudflare token liveness
        id: cf-verify
        if: inputs.verify_cloudflare == true && steps.cf-token.outputs.cf_token_resolved == 'true'
        env:
          CF_TOKEN: ${{ steps.cf-token.outputs.resolved_token }}
        run: |
          RESP=$(curl --silent \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          STATUS=$(echo  "$RESP" | jq -r '.result.status // "unknown"')
          ERR_CODE=$(echo "$RESP" | jq -r '.errors[0].code // 0')

          if [[ "$SUCCESS" == "true" && "$STATUS" == "active" ]]; then
            TOKEN_ID=$(echo "$RESP" | jq -r '.result.id // "unknown"')
            echo "token_id=$TOKEN_ID"     >> "$GITHUB_OUTPUT"
            echo "token_type=standard"   >> "$GITHUB_OUTPUT"
            echo "BRMSTE-AUTH OK: Cloudflare token active (id=$TOKEN_ID type=standard)"
          elif [[ "$ERR_CODE" == "1000" ]]; then
            # Error 1000 = R2-scoped API token â€” verify endpoint not supported,
            # but the token is valid. Workers scope check below confirms access.
            echo "token_id=r2-type"    >> "$GITHUB_OUTPUT"
            echo "token_type=r2"       >> "$GITHUB_OUTPUT"
            echo "BRMSTE-AUTH INFO: R2-type token detected â€” skipping /user/tokens/verify (not supported for R2 tokens)"
            echo "::notice::R2-scoped tokens do not support /user/tokens/verify. Workers scope check will confirm access."
          else
            ERRORS=$(echo "$RESP" | jq -r '[.errors[]?.message] | join(", ")' 2>/dev/null || echo "")
            echo "::error::Cloudflare token rejected (status=$STATUS code=$ERR_CODE errors=$ERRORS)." \
              "Rotate or verify at: https://dash.cloudflare.com/profile/api-tokens"
            exit 1
          fi

      # Workers scope check runs whenever a token was resolved + account ID is set.
      # It is NOT gated on token_id so R2-type tokens are also covered.
      - name: Verify Workers Scripts scope
        id: cf-workers
        if: >
          inputs.verify_cloudflare == true &&
          inputs.cloudflare_account_id != '' &&
          steps.cf-token.outputs.cf_token_resolved == 'true'
        env:
          CF_TOKEN:    ${{ steps.cf-token.outputs.resolved_token }}
          ACCOUNT_ID:  ${{ inputs.cloudflare_account_id }}
        run: |
          RESP=$(curl --silent \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts?per_page=1")
          HTTP_SUCCESS=$(echo "$RESP" | jq -r '.success')
          SCRIPT_COUNT=$(echo "$RESP" | jq -r '.result | length')

          if [[ "$HTTP_SUCCESS" == "true" ]]; then
            echo "workers_ok=true"               >> "$GITHUB_OUTPUT"
            echo "workers_script_count=$SCRIPT_COUNT" >> "$GITHUB_OUTPUT"
            echo "BRMSTE-AUTH OK: Workers Scripts access confirmed on account $ACCOUNT_ID ($SCRIPT_COUNT scripts visible)"
          else
            ERR_CODE=$(echo "$RESP" | jq -r '.errors[0].code // 0')
            ERR_MSG=$(echo  "$RESP" | jq -r '.errors[0].message // "unknown"')
            case "$ERR_CODE" in
              10000)
                echo "::error::Token authentication failed on Workers API (code=$ERR_CODE)." \
                  "Verify or rotate at: https://dash.cloudflare.com/profile/api-tokens"
                ;;
              10007|9109)
                echo "::error::Token lacks Account.Workers Scripts permission on account $ACCOUNT_ID (code=$ERR_CODE)." \
                  "Recreate the token with 'Account.Workers Scripts:Edit':" \
                  "https://dash.cloudflare.com/profile/api-tokens"
                ;;
              7003|7000)
                echo "::error::Account '$ACCOUNT_ID' not found (code=$ERR_CODE)." \
                  "Confirm at: https://dash.cloudflare.com/?to=/:account/workers"
                ;;
              *)
                echo "::error::Workers Scripts API error (code=$ERR_CODE msg=$ERR_MSG) for account $ACCOUNT_ID"
                ;;
            esac
            exit 1
          fi

      # â”€â”€ 5. R2 S3 credential check â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Verify R2 credentials
        id: r2-verify
        if: inputs.verify_r2 == true
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          ACCOUNT_ID:           ${{ inputs.cloudflare_account_id }}
        run: |
          if [[ -z "${R2_ACCESS_KEY_ID:-}" || -z "${R2_SECRET_ACCESS_KEY:-}" ]]; then
            echo "::error::R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY must both be set" \
              "in GitHub Environment '${{ inputs.environment }}'."
            echo "::error::Run scripts/setup-gh-secrets.sh or add them manually at:" \
              "https://github.com/${{ github.repository }}/settings/environments"
            exit 1
          fi

          # Mask secrets before any output.
          echo "::add-mask::$R2_ACCESS_KEY_ID"
          echo "::add-mask::$R2_SECRET_ACCESS_KEY"

          ACCT="${ACCOUNT_ID:-7ea6547b1d6eb1cbd6d0ac5cf960ce2a}"
          R2_ENDPOINT="https://${ACCT}.r2.cloudflarestorage.com"

          # List buckets via S3 ListBuckets â€” uses AWS Signature V4 via curl + openssl.
          DATE=$(date -u +"%Y%m%d")
          DATETIME=$(date -u +"%Y%m%dT%H%M%SZ")
          HOST="${ACCT}.r2.cloudflarestorage.com"

          CANONICAL_REQUEST="GET\n/\n\nhost:${HOST}\nx-amz-date:${DATETIME}\n\nhost;x-amz-date\ne3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
          STRING_TO_SIGN="AWS4-HMAC-SHA256\n${DATETIME}\n${DATE}/auto/s3/aws4_request\n$(printf '%s' "$CANONICAL_REQUEST" | openssl dgst -sha256 | awk '{print $2}')"

          SIGNING_KEY=$(printf '%s' "aws4_request" | openssl dgst -sha256 -mac HMAC \
            -macopt "hexkey:$(printf '%s' "s3" | openssl dgst -sha256 -mac HMAC \
              -macopt "hexkey:$(printf '%s' "auto" | openssl dgst -sha256 -mac HMAC \
                -macopt "hexkey:$(printf '%s' "$DATE" | openssl dgst -sha256 -mac HMAC \
                  -macopt "key:AWS4${R2_SECRET_ACCESS_KEY}" | awk '{print $2}')" | awk '{print $2}')" | awk '{print $2}')" | awk '{print $2}')

          SIGNATURE=$(printf '%s' "$STRING_TO_SIGN" | openssl dgst -sha256 -mac HMAC \
            -macopt "hexkey:${SIGNING_KEY}" | awk '{print $2}')

          HTTP=$(curl -s -o /tmp/r2_list.xml -w "%{http_code}" \
            -H "Host: $HOST" \
            -H "x-amz-date: $DATETIME" \
            -H "Authorization: AWS4-HMAC-SHA256 Credential=${R2_ACCESS_KEY_ID}/${DATE}/auto/s3/aws4_request,SignedHeaders=host;x-amz-date,Signature=${SIGNATURE}" \
            "${R2_ENDPOINT}/")

          if [[ "$HTTP" == "200" ]]; then
            BUCKET_COUNT=$(grep -o '<Name>' /tmp/r2_list.xml | wc -l | tr -d ' ')
            echo "r2_ok=true"                     >> "$GITHUB_OUTPUT"
            echo "r2_bucket_count=$BUCKET_COUNT"  >> "$GITHUB_OUTPUT"
            echo "BRMSTE-AUTH OK: R2 credentials valid â€” $BUCKET_COUNT bucket(s) visible"
          else
            R2_ERR=$(cat /tmp/r2_list.xml 2>/dev/null | grep -oP '(?<=<Code>)[^<]+' || echo "unknown")
            echo "::error::R2 S3 probe failed (HTTP $HTTP code=$R2_ERR)." \
              "Check R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY in environment '${{ inputs.environment }}'."
            exit 1
          fi

      # â”€â”€ 6. Job summary â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Write job summary
        if: always()
        env:
          ENV:            ${{ inputs.environment }}
          LANE:           ${{ inputs.lane }}
          OIDC_SUB:       ${{ steps.oidc.outputs.oidc_sub }}
          OIDC_REF:       ${{ steps.oidc.outputs.oidc_ref }}
          OIDC_REPO:      ${{ steps.oidc.outputs.oidc_repo }}
          CF_VERIFIED:    ${{ inputs.verify_cloudflare }}
          CF_TOKEN_ID:    ${{ steps.cf-verify.outputs.token_id }}
          CF_TOKEN_TYPE:  ${{ steps.cf-verify.outputs.token_type }}
          WORKERS_OK:     ${{ steps.cf-workers.outputs.workers_ok }}
          WORKERS_COUNT:  ${{ steps.cf-workers.outputs.workers_script_count }}
          ACCOUNT_ID:     ${{ inputs.cloudflare_account_id }}
          R2_VERIFIED:    ${{ inputs.verify_r2 }}
          R2_OK:          ${{ steps.r2-verify.outputs.r2_ok }}
          R2_BUCKETS:     ${{ steps.r2-verify.outputs.r2_bucket_count }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## BRMSTE Auth Setup â€” \`$ENV\`

          | Check | Value |
          |-------|-------|
          | Environment | \`$ENV\` |
          | Lane | \`$LANE\` |
          | OIDC sub | \`${OIDC_SUB:-â€”}\` |
          | OIDC ref | \`${OIDC_REF:-â€”}\` |
          | OIDC repo | \`${OIDC_REPO:-â€”}\` |
          | CF token type | \`${CF_TOKEN_TYPE:-â€”}\` |
          | CF token ID | \`${CF_TOKEN_ID:-â€”}\` |
          | CF account ID | \`${ACCOUNT_ID:-â€”}\` |
          | Workers scope | \`${WORKERS_OK:-false}\` |
          | Workers scripts visible | \`${WORKERS_COUNT:-â€”}\` |
          | R2 verified | \`${R2_VERIFIED:-false}\` |
          | R2 buckets visible | \`${R2_BUCKETS:-â€”}\` |

          > **BRMSTE LTD Â· GB2607860 Â· PCT/GB2026/050406**
          EOF
