name: Deploy BRMSTE Networks (Cloudflare)

# Publishes site/networks to brmste.com/networks via a Cloudflare Worker route.
# Manual only. Requires two secrets to be set on the repo or org:
#   CLOUDFLARE_API_TOKEN   - token with Workers Scripts: Edit + the brmste.com zone
#   CLOUDFLARE_ACCOUNT_ID  - the Cloudflare account that owns the brmste.com zone

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Require Cloudflare credentials
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets to enable deploy."
            echo "See site/networks/README.md for the exact token scopes."
            exit 1
          fi
          echo "Cloudflare credentials present — proceeding."

      - name: Deploy worker (brmste.com/networks*)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site/networks
          command: deploy
