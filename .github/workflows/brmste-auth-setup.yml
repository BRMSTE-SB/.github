name: BRMSTE Auth Setup

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target GitHub Environment
        required: true
        default: fort-knox-staging
        type: choice
        options:
          - fort-knox-staging
          - fort-knox-prod
          - human-open
      cloudflare_account_id:
        description: Cloudflare account ID
        required: false
        # Real BRMSTE account ID — not a secret.
        default: '7ea6547b1d6eb1cbd6d0ac5cf960ce2a'
        type: string
      verify_cloudflare:
        description: Verify Cloudflare API token + Workers scope
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  id-token: write

concurrency:
  group: brmste-auth-setup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Auto-run on push / PR ─────────────────────────────────────────────────
  staging:
    name: Auth setup · fort-knox-staging
    if: github.event_name != 'workflow_dispatch'
    uses: BRMSTE-SB/.github/.github/workflows/brmste-auth-setup-reusable.yml@main
    with:
      environment:           fort-knox-staging
      lane:                  fort_knox_private
      # Always probe Workers scope on push/PR so broken tokens surface immediately.
      cloudflare_account_id: '7ea6547b1d6eb1cbd6d0ac5cf960ce2a'
      verify_cloudflare:     true
    secrets: inherit

  # ── Manual dispatch ───────────────────────────────────────────────────────
  dispatch:
    name: Auth setup · ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    uses: BRMSTE-SB/.github/.github/workflows/brmste-auth-setup-reusable.yml@main
    with:
      environment:           ${{ inputs.environment }}
      lane:                  ${{ inputs.environment == 'human-open' && 'human_open' || 'fort_knox_private' }}
      cloudflare_account_id: ${{ inputs.cloudflare_account_id }}
      verify_cloudflare:     ${{ inputs.verify_cloudflare == 'true' }}
    secrets: inherit
