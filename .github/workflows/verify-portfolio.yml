name: Verify Portfolio Manifests

on:
  push:
    branches: [main]
    paths:
      - "data/portfolios/**"
      - "scripts/verify-portfolio-manifest.sh"
      - "scripts/etoro-build-portfolio-100.sh"
  pull_request:
    branches: [main]
    paths:
      - "data/portfolios/**"
      - "scripts/verify-portfolio-manifest.sh"
      - "scripts/etoro-build-portfolio-100.sh"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate portfolio manifests
        run: bash scripts/verify-portfolio-manifest.sh

      - name: Plan mode (no credentials)
        run: bash scripts/etoro-build-portfolio-100.sh --plan
