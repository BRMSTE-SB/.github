# BRMSTE GSI — Global Substrate Infrastructure™
# Cloudflare Workers deployment configuration · Wrangler v3
#
# BRMSTE LTD · Companies House 15310393 · GB2607860 · PCT/GB2026/050406
#
# Required GitHub Actions secrets before deploying:
#   CF_API_TOKEN        — Cloudflare API token (Workers:Edit, Zone:Edit, Zone:Read)
#   CF_ACCOUNT_ID       — Cloudflare account ID
#
# To deploy manually:
#   cd deploy
#   npx wrangler deploy --config wrangler.toml
#
# CURSOR NEVER SIGNS · OPERATOR NEVER SIGNS · EDGE SIGNS · JUDGMENT SIGNS

name            = "brmste-gsi"
main            = "worker/index.ts"
compatibility_date = "2024-01-01"

# Primary account — set via CF_ACCOUNT_ID env var or replace below
account_id      = "${CF_ACCOUNT_ID}"

# ── Primary domain: brmste.com ────────────────────────────────────────────────
[[routes]]
pattern  = "brmste.com/*"
zone_name = "brmste.com"

[[routes]]
pattern  = "www.brmste.com/*"
zone_name = "brmste.com"

# ── AI domain: brmste.ai ──────────────────────────────────────────────────────
[[routes]]
pattern  = "brmste.ai/*"
zone_name = "brmste.ai"

[[routes]]
pattern  = "www.brmste.ai/*"
zone_name = "brmste.ai"

# ── Additional BRMSTE LTD domains (domains 3–38) ─────────────────────────────
# OPERATOR: uncomment and complete each block with actual domain once
# domains/manifest.json is fully populated.
#
# [[routes]]
# pattern   = "${DOMAIN_03}/*"
# zone_name = "${DOMAIN_03}"
#
# [[routes]]
# pattern   = "${DOMAIN_04}/*"
# zone_name = "${DOMAIN_04}"
#
# ... repeat for all 38 domains ...

# ── Worker settings ───────────────────────────────────────────────────────────
[build]
command = ""        # Worker is pure TypeScript — Wrangler compiles directly

[observability]
enabled = true

# ── Environment-specific overrides ───────────────────────────────────────────
[env.production]
name = "brmste-gsi-production"

vars = { BRMSTE_ENTITY = "BRMSTE LTD", BRMSTE_PATENT = "GB2607860", BRMSTE_ENV = "production" }
